<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TelecomRAG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Fira+Code:wght@400;500&family=DM+Sans:wght@400;500&display=swap');

/* ══════════════════════════════════════════
   STEP 1 — THEME TOKENS
   Edit here to re-skin everything at once
   ══════════════════════════════════════════ */
:root {
  --bg:      #07090f;
  --bg2:     #0c1018;
  --bg3:     #111827;
  --bg4:     #0f1a2e;
  --neon1:   #b06ef3;   /* purple  */
  --neon2:   #00ffe0;   /* cyan    */
  --neon3:   #ff4fa3;   /* pink    */
  --green:   #00ffaa;
  --gold:    #fbbf24;
  --red:     #ff3d5a;
  --text:    #ede8ff;
  --text2:   #8b80b0;
  --text3:   #3a3258;
  --border:  rgba(176,110,243,0.18);
  --border2: rgba(176,110,243,0.35);
  --f-disp:  'Syne', sans-serif;
  --f-body:  'DM Sans', sans-serif;
  --f-mono:  'Fira Code', monospace;
  --r:  10px;
  --rl: 14px;
}

/* ══════════════════════════════════════════
   STEP 2 — RESET & BASE
   ══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--f-body);background:var(--bg);color:var(--text)}

/* ══════════════════════════════════════════
   STEP 3 — OUTER SHELL
   ══════════════════════════════════════════ */
#app{
  display:flex;flex-direction:column;
  height:100vh;max-width:960px;
  margin:0 auto;
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  background-image:
    linear-gradient(rgba(176,110,243,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(176,110,243,0.025) 1px,transparent 1px);
  background-size:28px 28px;
  position:relative;
}

/* ══════════════════════════════════════════
   STEP 4 — HEADER
   ══════════════════════════════════════════ */
.hdr{
  flex-shrink:0;
  display:flex;align-items:center;gap:14px;
  padding:14px 24px;
  background:linear-gradient(135deg,rgba(176,110,243,0.13),rgba(0,255,224,0.04));
  border-bottom:1px solid var(--border);
  position:relative;z-index:3;
}
.hdr::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon1),var(--neon2),transparent);
  opacity:.4;
}
.hdr-logo{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--neon1),var(--neon2));
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 0 18px rgba(176,110,243,.5);
}
.hdr-title{
  font-family:var(--f-disp);font-size:15px;font-weight:800;letter-spacing:.04em;
  background:linear-gradient(90deg,var(--neon1) 20%,var(--neon2) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hdr-sub{font-family:var(--f-mono);font-size:10px;color:var(--text2);margin-top:2px;letter-spacing:.06em}
.hdr-status{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  font-family:var(--f-mono);font-size:10px;color:var(--green);
}
.dot{
  width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green),0 0 16px rgba(0,255,170,.4);
  animation:pulse-dot 2.4s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}

/* ══════════════════════════════════════════
   STEP 5 — SOURCE BAR
   ══════════════════════════════════════════ */
.srcbar{
  flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:8px 24px;background:rgba(12,16,24,.9);
  border-bottom:1px solid var(--border);z-index:3;
}
.pill{
  font-family:var(--f-mono);font-size:9.5px;font-weight:500;
  padding:3px 10px;border-radius:20px;letter-spacing:.08em;
  text-transform:uppercase;border:1px solid transparent;
  transition:opacity .25s,box-shadow .25s;
}
.pill.p3  {background:rgba(0,255,170,.1);  color:var(--green);border-color:rgba(0,255,170,.35);  box-shadow:0 0 8px rgba(0,255,170,.15)}
.pill.ph  {background:rgba(176,110,243,.1);color:var(--neon1);border-color:rgba(176,110,243,.35);box-shadow:0 0 8px rgba(176,110,243,.15)}
.pill.po  {background:rgba(251,191,36,.1); color:var(--gold); border-color:rgba(251,191,36,.35); box-shadow:0 0 8px rgba(251,191,36,.1)}
.pill:not(.active){opacity:.2;box-shadow:none}
.srcbar-r{margin-left:auto;font-family:var(--f-mono);font-size:10px;color:var(--text3)}

/* ══════════════════════════════════════════
   STEP 6 — MESSAGES AREA
   ══════════════════════════════════════════ */
#msgs{
  flex:1;overflow-y:auto;
  padding:24px 24px 12px;
  display:flex;flex-direction:column;gap:20px;
  scrollbar-width:thin;scrollbar-color:#1e1535 transparent;
}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:#22183a;border-radius:2px}

/* ══════════════════════════════════════════
   STEP 7 — MESSAGE ROWS & AVATARS
   ══════════════════════════════════════════ */
.row{display:flex;gap:10px;align-items:flex-start;animation:msg-in .28s cubic-bezier(.22,1,.36,1)}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.row.user{flex-direction:row-reverse}

.av{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-disp);font-size:11px;font-weight:800;
}
.av.bot{
  background:linear-gradient(135deg,var(--neon1),var(--neon2));color:#07090f;
  box-shadow:0 0 14px rgba(176,110,243,.5);
}
.av.user{
  background:linear-gradient(135deg,#180d30,#2c1260);color:var(--neon1);
  border:1px solid rgba(176,110,243,.4);
}

/* ══════════════════════════════════════════
   STEP 8 — BUBBLES
   ══════════════════════════════════════════ */
.bub{
  max-width:78%;padding:12px 16px;
  border-radius:var(--rl);font-size:13.5px;line-height:1.68;position:relative;
}
.row.bot .bub{
  background:var(--bg4);border:1px solid rgba(176,110,243,.2);
  border-top-left-radius:2px;color:var(--text);
}
.row.bot .bub::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--neon1),transparent 55%);
  border-radius:var(--rl) var(--rl) 0 0;
}
.row.user .bub{
  background:linear-gradient(135deg,rgba(176,110,243,.13),rgba(0,255,224,.04));
  border:1px solid rgba(176,110,243,.28);border-top-right-radius:2px;color:var(--text);
}
.bub code{
  font-family:var(--f-mono);font-size:11.5px;
  background:rgba(176,110,243,.15);padding:1px 6px;border-radius:3px;
  color:var(--neon2);border:1px solid rgba(0,255,224,.14);
}
.bub strong{color:var(--text);font-weight:500}

/* ══════════════════════════════════════════
   STEP 9 — SOURCE BADGES
   ══════════════════════════════════════════ */
.badge{
  display:inline-block;font-family:var(--f-mono);font-size:9px;font-weight:500;
  padding:2px 8px;border-radius:3px;margin-bottom:6px;
  letter-spacing:.1em;text-transform:uppercase;
}
.b3  {background:rgba(0,255,170,.1);  color:var(--green);border:1px solid rgba(0,255,170,.28)}
.bh  {background:rgba(176,110,243,.12);color:var(--neon1);border:1px solid rgba(176,110,243,.28)}
.bo  {background:rgba(251,191,36,.1); color:var(--gold); border:1px solid rgba(251,191,36,.28)}
.berr{background:rgba(255,61,90,.1);  color:var(--red);  border:1px solid rgba(255,61,90,.28)}

.sec-div{height:1px;margin:10px 0;background:linear-gradient(90deg,transparent,rgba(176,110,243,.3),transparent)}

/* ══════════════════════════════════════════
   STEP 10 — CONFIDENCE BAR
   ══════════════════════════════════════════ */
.conf-row{display:flex;align-items:center;gap:8px;margin-top:8px;font-family:var(--f-mono);font-size:10px;color:var(--text3)}
.conf-bar{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px;transition:width .9s cubic-bezier(.22,1,.36,1)}
.cf-hi{background:linear-gradient(90deg,var(--green),var(--neon2));box-shadow:0 0 6px rgba(0,255,170,.45)}
.cf-md{background:linear-gradient(90deg,var(--neon1),var(--neon3));box-shadow:0 0 6px rgba(176,110,243,.4)}
.cf-lo{background:linear-gradient(90deg,var(--gold),var(--red))}
.conf-pct{color:var(--text2);min-width:32px;text-align:right}

/* ══════════════════════════════════════════
   STEP 11 — TYPING DOTS
   ══════════════════════════════════════════ */
.dots{display:flex;gap:5px;padding:4px 0;align-items:center}
.dots span{width:7px;height:7px;border-radius:50%;animation:db 1.3s ease-in-out infinite}
.dots span:nth-child(1){background:var(--neon1)}
.dots span:nth-child(2){background:var(--neon2);animation-delay:.2s}
.dots span:nth-child(3){background:var(--neon3);animation-delay:.4s}
@keyframes db{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* ══════════════════════════════════════════
   STEP 12 — PIPELINE TRACE
   ══════════════════════════════════════════ */
.trace-toggle{
  display:flex;align-items:center;gap:5px;margin-top:9px;
  font-family:var(--f-mono);font-size:10px;color:var(--text3);
  cursor:pointer;letter-spacing:.04em;user-select:none;transition:color .15s;
}
.trace-toggle:hover{color:var(--neon2)}
.trace-arr{color:var(--neon2);transition:transform .2s;display:inline-block}
.trace-open .trace-arr{transform:rotate(90deg)}
.trace-body{
  display:none;margin-top:5px;padding:8px 12px;
  background:rgba(0,255,224,.025);border-left:2px solid rgba(0,255,224,.18);
  border-radius:0 6px 6px 0;font-family:var(--f-mono);font-size:10px;line-height:1.85;color:var(--text3);
}
.trace-body.open{display:block}
.th{font-weight:500}
.th.hit{color:var(--green)}
.th.miss{color:var(--red)}
.th.fb{color:var(--gold)}
.td{color:var(--text2)}

/* ══════════════════════════════════════════
   STEP 13 — SUGGESTION CHIPS
   ══════════════════════════════════════════ */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.chip{
  font-family:var(--f-mono);font-size:10px;background:transparent;
  border:1px solid rgba(176,110,243,.28);color:var(--text2);
  padding:4px 11px;border-radius:5px;cursor:pointer;
  transition:background .15s,color .15s,border-color .15s,box-shadow .15s;
}
.chip:hover{
  background:rgba(176,110,243,.1);color:var(--neon1);
  border-color:var(--neon1);box-shadow:0 0 10px rgba(176,110,243,.2);
}
.chip:disabled{opacity:.4;cursor:default;pointer-events:none}

/* ══════════════════════════════════════════
   STEP 14 — INPUT AREA
   ══════════════════════════════════════════ */
.inp-area{
  flex-shrink:0;display:flex;gap:10px;align-items:center;
  padding:12px 20px;background:rgba(12,16,24,.98);
  border-top:1px solid var(--border);position:relative;z-index:3;
}
.inp-area::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon1),var(--neon2),var(--neon3),transparent);
  opacity:.45;
}
.inp-wrap{
  flex:1;background:var(--bg3);border:1px solid rgba(176,110,243,.22);
  border-radius:var(--r);display:flex;align-items:center;padding:0 14px;
  transition:border-color .2s,box-shadow .2s;
}
.inp-wrap:focus-within{border-color:var(--neon1);box-shadow:0 0 18px rgba(176,110,243,.22)}
#qinput{
  width:100%;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--f-body);font-size:13.5px;padding:10px 0;
}
#qinput::placeholder{color:var(--text3);font-style:italic}
#qinput:disabled{opacity:.5}
.send{
  width:38px;height:38px;flex-shrink:0;border:none;border-radius:var(--r);cursor:pointer;
  background:linear-gradient(135deg,var(--neon1),var(--neon2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px rgba(176,110,243,.45);
  transition:transform .12s,box-shadow .15s;
}
.send:hover{transform:scale(1.07);box-shadow:0 0 26px rgba(176,110,243,.65)}
.send:active{transform:scale(.92)}
.send:disabled{opacity:.4;cursor:default;transform:none}
.send svg{width:16px;height:16px;fill:#07090f}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-logo">📡</div>
    <div>
      <div class="hdr-title">TELECOM RAG // SYSTEM</div>
      <div class="hdr-sub" id="hdr-sub">3GPP → HedEx → OpenAI · RTX 5080 · qwen2.5:14b</div>
    </div>
    <div class="hdr-status">
      <div class="dot" id="status-dot"></div>
      <span id="status-txt">CONNECTING</span>
    </div>
  </header>

  <!-- SOURCE BAR -->
  <div class="srcbar">
    <div class="pill p3 active" id="pill-3gpp">3GPP specs</div>
    <div class="pill ph active" id="pill-hedex">HedEx MOP</div>
    <div class="pill po"        id="pill-openai">OpenAI fallback</div>
    <span class="srcbar-r">LOCAL GPU ●</span>
  </div>

  <!-- MESSAGES -->
  <div id="msgs">
    <!-- welcome injected by JS -->
  </div>

  <!-- INPUT -->
  <div class="inp-area">
    <div class="inp-wrap">
      <input id="qinput" type="text"
        placeholder="Query 3GPP specs or HedEx parameters…"
        autocomplete="off"/>
    </div>
    <button class="send" id="sendbtn">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div><!-- /#app -->

<script>
/* ════════════════════════════════════════════
   CONFIG — change API_BASE if backend moves
   ════════════════════════════════════════════ */
const API_BASE = 'http://localhost:8000';   // ← point to your FastAPI server

/* ════════════════════════════════════════════
   HEALTH CHECK ON LOAD
   ════════════════════════════════════════════ */
async function checkHealth() {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-txt');
  try {
    const res  = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(4000) });
    const data = await res.json();
    if (data.api === 'ok') {
      dot.style.background = 'var(--green)';
      dot.style.boxShadow  = '0 0 8px var(--green), 0 0 16px rgba(0,255,170,.4)';
      txt.textContent      = 'ONLINE';
      txt.style.color      = 'var(--green)';
      const sub = document.getElementById('hdr-sub');
      if (data.collections_found)
        sub.textContent = `Collections: ${data.collections_found.join(', ')} · ${data.ollama === 'ok' ? 'Ollama OK' : data.ollama}`;
    } else {
      setOffline();
    }
  } catch {
    setOffline();
  }
}

function setOffline() {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-txt');
  dot.style.background = 'var(--red)';
  dot.style.boxShadow  = 'none';
  txt.textContent      = 'API OFFLINE';
  txt.style.color      = 'var(--red)';
}

/* ════════════════════════════════════════════
   DOM HELPERS
   ════════════════════════════════════════════ */
const msgs   = document.getElementById('msgs');
const qinput = document.getElementById('qinput');
const sendbtn= document.getElementById('sendbtn');

function scroll() { msgs.scrollTop = msgs.scrollHeight; }

function setLoading(on) {
  qinput.disabled  = on;
  sendbtn.disabled = on;
  document.querySelectorAll('.chip').forEach(c => c.disabled = on);
}

function addMsg(role, html) {
  const row = document.createElement('div');
  row.className = 'row ' + role;
  if (role === 'user') {
    row.innerHTML = `<div class="av user">TK</div><div class="bub">${html}</div>`;
  } else {
    row.innerHTML = `<div class="av bot">AI</div><div>${html}</div>`;
  }
  msgs.appendChild(row);
  scroll();
  return row;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'row bot'; row.id = 'typing';
  row.innerHTML = `<div class="av bot">AI</div><div class="bub"><div class="dots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(row); scroll();
}
function hideTyping() { document.getElementById('typing')?.remove(); }

/* ════════════════════════════════════════════
   SOURCE PILLS
   ════════════════════════════════════════════ */
function setPills(source) {
  document.getElementById('pill-3gpp').classList.toggle('active',
    source === '3gpp' || source === 'both');
  document.getElementById('pill-hedex').classList.toggle('active',
    source === 'hedex' || source === 'both');
  document.getElementById('pill-openai').classList.toggle('active',
    source === 'openai');
}

/* ════════════════════════════════════════════
   CONFIDENCE CLASS
   ════════════════════════════════════════════ */
function cfClass(s) {
  if (s >= 0.8) return 'cf-hi';
  if (s >= 0.6) return 'cf-md';
  return 'cf-lo';
}

/* ════════════════════════════════════════════
   BUBBLE BUILDER — takes /query API response
   ════════════════════════════════════════════ */
function buildBubble(data) {
  const src   = data.source;
  const score = data.score;
  const pct   = Math.round(score * 100);
  const tid   = 'tr-' + Date.now();

  // Format answer text: newlines → <br>, **text** → <strong>
  function fmt(txt) {
    return txt
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g,     '<code>$1</code>')
      .replace(/\n/g,            '<br>');
  }

  let html = '<div class="bub">';

  if (src === 'openai') {
    html += `<span class="badge bo">OpenAI fallback</span><br>`;
    html += `<div style="margin-bottom:6px">${fmt(data.answer)}</div>`;
    html += confBar(pct);
  } else {
    // For 3gpp or hedex, label clearly
    const badgeCls  = src === '3gpp' ? 'b3' : 'bh';
    const badgeTxt  = src === '3gpp' ? '3GPP specs' : 'HedEx MOP';
    html += `<span class="badge ${badgeCls}">${badgeTxt}</span><br>`;
    html += `<div style="margin-bottom:6px">${fmt(data.answer)}</div>`;
    html += confBar(pct);
  }

  if (src === 'error') {
    html = '<div class="bub">';
    html += `<span class="badge berr">Error</span><br>`;
    html += `<div>${fmt(data.answer)}</div>`;
  }

  // Pipeline trace
  html += buildTrace(data.pipeline_trace, tid);
  html += '</div>';
  return html;
}

function confBar(pct) {
  const cls = pct >= 80 ? 'cf-hi' : pct >= 60 ? 'cf-md' : 'cf-lo';
  return `
    <div class="conf-row">
      <span>confidence</span>
      <div class="conf-bar"><div class="conf-fill ${cls}" style="width:${pct}%"></div></div>
      <span class="conf-pct">${pct}%</span>
    </div>`;
}

function buildTrace(hops, tid) {
  if (!hops || hops.length === 0) return '';
  const rows = hops.map((h,i) =>
    `<div><span class="th ${h.cls}">hop ${h.hop} · ${h.label}</span>&nbsp;<span class="td">${h.detail}</span></div>`
  ).join('');
  return `
    <div class="trace-toggle" id="tt-${tid}" onclick="toggleTrace('${tid}')">
      <span class="trace-arr">▶</span> pipeline trace
    </div>
    <div class="trace-body" id="${tid}">${rows}</div>`;
}

function toggleTrace(tid) {
  document.getElementById(tid).classList.toggle('open');
  document.getElementById('tt-'+tid).classList.toggle('trace-open');
}

/* ════════════════════════════════════════════
   WELCOME MESSAGE
   ════════════════════════════════════════════ */
function showWelcome() {
  const html = `<div class="bub">
    Ready. Ask anything about 3GPP standards or Huawei HedEx.
    I query <code>3GPP first</code>, then <code>HedEx MOP</code>,
    then fall back to OpenAI only if local scores are low.
    <div class="chips">
      <button class="chip" onclick="sendQuery('VoNR call drop parameters')">VoNR call drop parameters</button>
      <button class="chip" onclick="sendQuery('NSA ENDC setup failure causes')">NSA ENDC setup failure</button>
      <button class="chip" onclick="sendQuery('Massive MIMO beamforming configuration')">Massive MIMO beamforming</button>
      <button class="chip" onclick="sendQuery('PdcpSduDiscardTimer HedEx parameter')">HedEx: PdcpSduDiscardTimer</button>
      <button class="chip" onclick="sendQuery('5G NR handover parameters')">5G NR handover params</button>
    </div>
  </div>`;
  addMsg('bot', html);
}

/* ════════════════════════════════════════════
   MAIN SEND / QUERY
   ════════════════════════════════════════════ */
async function sendQuery(q) {
  q = (q || qinput.value).trim();
  if (!q) return;
  qinput.value = '';

  addMsg('user', q);
  setLoading(true);
  showTyping();

  try {
    const res  = await fetch(`${API_BASE}/query`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ query: q }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    hideTyping();
    setPills(data.source);
    addMsg('bot', buildBubble(data));

  } catch (err) {
    hideTyping();
    // Show mock answer if API is offline (dev/demo mode)
    const mock = getMockAnswer(q);
    if (mock) {
      setPills(mock.source);
      addMsg('bot', buildBubble(mock));
    } else {
      addMsg('bot', `<div class="bub"><span class="badge berr">Connection error</span><br>
        Cannot reach API at <code>${API_BASE}</code>.<br>
        Start the backend: <code>cd backend && python api.py</code></div>`);
    }
  } finally {
    setLoading(false);
  }
}
